# ═══════════════════════════════════════════════════════════
#  Social Media Engine — Spring Boot Configuration
# ═══════════════════════════════════════════════════════════

# Server port — frontend will call http://localhost:8080
server.port=8080

# Application name
spring.application.name=social-media-engine

# Pretty-print JSON responses (easier to read in browser/Postman)
spring.jackson.serialization.indent-output=true

# CORS is handled in WebConfig.java